<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>证书查询结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef2f7;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px 16px 48px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 560px;
            margin: 0 auto;
        }
        .result-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 28px 20px 32px;
            margin-bottom: 24px;
        }
        .result-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .result-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3b4c 0%, #2c4c6c 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .result-header .sub {
            font-size: 13px;
            color: #2e7d57;
            background: #e6f4ec;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            margin-top: 10px;
        }
        .info-list {
            background: #f7fafd;
            border-radius: 18px;
            padding: 14px 18px;
            margin-bottom: 20px;
        }
        .info-list .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px dashed #e2e8f0;
        }
        .info-list .row:last-child {
            border-bottom: none;
        }
        .info-list .label {
            color: #5b7a9a;
        }
        .info-list .value {
            color: #1e3a5f;
            font-weight: 600;
            max-width: 60%;
            text-align: right;
            word-break: break-all;
        }
        .cert-image-container {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            background: #fff;
            padding: 12px;
            margin-bottom: 20px;
        }
        .cert-image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }
        .image-fallback {
            text-align: center;
            padding: 40px 20px;
            background: #f9f3e9;
            color: #b97f44;
            border-radius: 20px;
            font-size: 14px;
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            border: none;
            border-radius: 40px;
            padding: 13px 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(95deg, #2c6e9e 0%, #1f4e6e 100%);
            color: #fff;
        }
        .btn-secondary {
            background: #f0f4f9;
            color: #1e3a5f;
        }
        .btn:active {
            transform: scale(0.97);
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #8da1b5;
            margin-top: 28px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="result-card">
        <div class="result-header">
            <h1>查询结果</h1>
            <div class="sub">✓ 证书信息已核验</div>
        </div>

        <div class="info-list">
            <div class="row"><span class="label">姓 名</span><span class="value" id="vName">--</span></div>
            <div class="row"><span class="label">身份证号</span><span class="value" id="vId">--</span></div>
            <div class="row"><span class="label">证书编号</span><span class="value" id="vCert">--</span></div>
        </div>

        <div class="cert-image-container">
            <img id="certificateImg" src="certificate.jpg" alt="专业技术人员职业证书" onerror="handleImageError()">
            <div id="errorMsg" style="display:none;" class="image-fallback">
                ⚠️ 未找到证书图片<br>
                请将证书图片命名为 <strong>certificate.jpg</strong><br>
                并放在与本页面相同的文件夹内。
            </div>
        </div>

        <div class="actions">
            <a href="query.html" class="btn btn-secondary">← 返回查询</a>
            <a href="certificate.jpg" target="_blank" class="btn btn-primary">查看大图</a>
        </div>
    </div>
    <footer>国家专业技术人才职业资格查询系统 | 官方认证</footer>
</div>

<script>
    function handleImageError() {
        document.getElementById('certificateImg').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'block';
    }

    // 从 URL 参数读取并展示查询信息
    (function () {
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const id = params.get('id');
        const cert = params.get('cert');
        if (name) document.getElementById('vName').textContent = name;
        if (id) document.getElementById('vId').textContent = id;
        if (cert) document.getElementById('vCert').textContent = cert;
    })();
</script>
</body>
</html>
