<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>专业技术人员证书查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px 16px 48px;
            min-height: 100vh;
            color: #1e3a5f;
            /* 城市建筑背景（Unsplash 公共图源：城市天际线），叠加一层深色渐变提高对比 */
            background:
                linear-gradient(180deg, rgba(15, 32, 50, 0.55) 0%, rgba(20, 45, 70, 0.6) 100%),
                url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat fixed,
                #1f3b4c;
        }
        .app-container {
            max-width: 560px;
            margin: 0 auto;
        }
        /* 查询卡片：半透明 + 毛玻璃，让背景隐约透出 */
        .query-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.25);
            padding: 28px 20px 32px;
            margin-bottom: 24px;
        }
        .query-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .query-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #1f3b4c 0%, #2c4c6c 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .query-header .sub {
            font-size: 14px;
            color: #5b7a9a;
            background: #f0f4f9;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-top: 8px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            font-size: 15px;
            font-weight: 600;
            color: #1e3a5f;
            display: block;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #2c7da0;
        }
        .query-btn {
            width: 100%;
            background: linear-gradient(95deg, #2c6e9e 0%, #1f4e6e 100%);
            border: none;
            border-radius: 40px;
            padding: 14px 0;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .query-btn:active {
            transform: scale(0.97);
        }
        /* 图片展示区域 */
        .cert-image-container {
            display: none;
            margin-top: 20px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            background: #fff;
            padding: 12px;
        }
        .cert-image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }
        .image-fallback {
            text-align: center;
            padding: 40px 20px;
            background: #f9f3e9;
            color: #b97f44;
            border-radius: 20px;
            font-size: 14px;
        }
        .demo-hint {
            text-align: center;
            font-size: 12px;
            color: #8aa3bc;
            margin-top: 28px;
            background: rgba(255,255,240,0.8);
            padding: 8px 12px;
            border-radius: 40px;
        }
        .error-msg {
            margin-top: 16px;
            color: #c53030;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
            margin-top: 28px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="query-card">
        <div class="query-header">
            <h1>证书查询</h1>
            <div class="sub">查询系统</div>
        </div>
        <div class="input-group">
            <label>姓 名</label>
            <input type="text" id="fullName" placeholder="请输入姓名">
        </div>
        <div class="input-group">
            <label>身份证号</label>
            <input type="text" id="idNumber" placeholder="请输入身份证号码">
        </div>
        <div class="input-group">
            <label>证书编号</label>
            <input type="text" id="certNumber" placeholder="请输入证书编号">
        </div>
        <button class="query-btn" id="searchBtn">🔍 立即查询</button>
        <div class="demo-hint">※ 点击查询后，将显示您上传的证书原图</div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <footer>国家专业技术人才职业资格查询系统 | 官方认证</footer>
</div>

<script>
    const searchBtn = document.getElementById('searchBtn');

    function goToCertificatePage() {
        const name = document.getElementById('fullName').value.trim();
        const id = document.getElementById('idNumber').value.trim();
        const cert = document.getElementById('certNumber').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        const expectedName = '康小强';
        const expectedId = '141125199207210052';
        const expectedCert = '20230000021';

        errorMsg.textContent = '';

        if (!name || !id || !cert) {
            errorMsg.textContent = '请填写姓名、身份证号和证书编号。';
            return;
        }

        if (name !== expectedName || id !== expectedId || cert !== expectedCert) {
            errorMsg.textContent = '查询失败，无对应人员证书。';
            return;
        }

        const params = new URLSearchParams();
        params.set('name', name);
        params.set('id', id);
        params.set('cert', cert);

        window.location.href = 'certificate.html?' + params.toString();
    }

    searchBtn.addEventListener('click', goToCertificatePage);

    // 回车支持
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goToCertificatePage();
        });
    });
</script>
</body>
</html>
